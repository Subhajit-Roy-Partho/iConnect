name: i_connect
description: "Apple-first SSH client built with Flutter."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.1
  crypto: ^3.0.7
  dartssh2: ^2.13.0
  drift: ^2.29.0
  file_picker: ^10.3.2
  flutter_riverpod: ^3.0.1
  flutter_secure_storage: ^10.0.0-beta.4
  go_router: ^16.2.5
  local_auth: ^2.3.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pinenacl: ^0.6.0
  sqlite3_flutter_libs: ^0.5.39
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  xterm: ^4.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  build_runner: ^2.10.1
  drift_dev: ^2.29.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
